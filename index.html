<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terry's Vinyl</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="room-glow" aria-hidden="true"></div>

  <header>
    <div class="header-inner">
      <div class="logo-block">
        <span class="logo-disc" aria-hidden="true"></span>
        <div>
          <h1>Terry's Vinyl</h1>
          <p class="tagline">A personal record collection</p>
        </div>
      </div>
      <button id="add-btn" class="btn-primary">+ Add Record</button>
    </div>
  </header>

  <main>
    <section class="controls">
      <input type="text" id="search" placeholder="Search artist or album…" aria-label="Search records" />
      <select id="filter-genre" aria-label="Filter by genre">
        <option value="">All Genres</option>
      </select>
      <select id="sort-select" aria-label="Sort records">
        <option value="recent">Most Recently Added</option>
        <option value="artist">Artist A–Z</option>
        <option value="album">Album A–Z</option>
      </select>
      <div class="view-toggle" role="group" aria-label="View mode">
        <button id="view-shelf" class="view-btn active" title="Shelf view">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <rect x="2" y="4" width="20" height="12" rx="1"/>
            <line x1="2" y1="20" x2="22" y2="20"/>
            <line x1="7" y1="16" x2="7" y2="20"/>
            <line x1="17" y1="16" x2="17" y2="20"/>
          </svg>
        </button>
        <button id="view-list" class="view-btn" title="List view">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <line x1="9" y1="6" x2="21" y2="6"/>
            <line x1="9" y1="12" x2="21" y2="12"/>
            <line x1="9" y1="18" x2="21" y2="18"/>
            <circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/>
            <circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/>
            <circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/>
          </svg>
        </button>
      </div>
      <span id="record-count" class="record-count"></span>
    </section>

    <!-- Shelf View -->
    <div id="shelf-view">
      <div class="shelf-wrap">
        <div id="shelf-records" class="shelf-records"></div>
        <div class="shelf-plank"></div>
      </div>
    </div>

    <!-- List View -->
    <div id="list-view" class="hidden">
      <table class="list-table">
        <thead>
          <tr>
            <th>Artist</th>
            <th>Album</th>
            <th>Year</th>
            <th>Genre</th>
            <th id="list-actions-th"></th>
          </tr>
        </thead>
        <tbody id="list-body"></tbody>
      </table>
    </div>

    <p id="empty-msg" class="empty-msg hidden">No records in the collection yet.</p>

    <!-- Recommend Section (public mode only) -->
    <section id="recommend-section" class="recommend-section hidden">
      <h2>Recommend an album</h2>
      <p>Heard something Terry needs in his collection? Send him a recommendation.</p>
      <form id="recommend-form" novalidate>
        <div class="recommend-fields">
          <label>
            Your name <span class="required">*</span>
            <input type="text" id="r-name" required placeholder="e.g. Alex" />
          </label>
          <label>
            Artist <span class="required">*</span>
            <input type="text" id="r-artist" required placeholder="e.g. Radiohead" />
          </label>
          <label>
            Album <span class="required">*</span>
            <input type="text" id="r-album" required placeholder="e.g. OK Computer" />
          </label>
        </div>
        <button type="submit" class="btn-primary">Send Recommendation →</button>
      </form>
    </section>
  </main>

  <!-- Record Detail Modal -->
  <div id="detail-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card detail-card">
      <div id="detail-disc" class="detail-disc"></div>
      <div class="detail-body">
        <span class="detail-artist" id="detail-artist"></span>
        <h2 class="detail-album" id="detail-album"></h2>
        <div class="card-meta" id="detail-meta"></div>
        <p class="card-notes" id="detail-notes"></p>
      </div>
      <div class="modal-actions">
        <button id="detail-close" class="btn-secondary">Close</button>
        <button id="detail-edit" class="btn-secondary">Edit</button>
        <button id="detail-delete" class="btn-danger">Remove</button>
      </div>
    </div>
  </div>

  <!-- Add / Edit Modal -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">
      <h2 id="modal-title">Add Record</h2>
      <form id="record-form" novalidate>
        <label>
          Artist <span class="required">*</span>
          <input type="text" id="f-artist" required placeholder="e.g. Fleetwood Mac" />
        </label>
        <label>
          Album <span class="required">*</span>
          <input type="text" id="f-album" required placeholder="e.g. Rumours" />
        </label>
        <label>
          Year
          <input type="number" id="f-year" min="1900" max="2099" placeholder="e.g. 1977" />
        </label>
        <label>
          Genre
          <input type="text" id="f-genre" placeholder="e.g. Rock" />
        </label>
        <label>
          Notes
          <textarea id="f-notes" rows="3" placeholder="Condition, pressing info, personal notes…"></textarea>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="f-skunk" />
          <span>🦨 Skunk Recommended</span>
        </label>
        <div class="modal-actions">
          <button type="button" id="cancel-btn" class="btn-secondary">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div id="confirm-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card modal-card--sm">
      <h2>Remove Record?</h2>
      <p id="confirm-msg"></p>
      <div class="modal-actions">
        <button id="confirm-cancel" class="btn-secondary">Cancel</button>
        <button id="confirm-delete" class="btn-danger">Remove</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
