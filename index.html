<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terry's Vinyl</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo-block">
        <span class="logo-disc" aria-hidden="true"></span>
        <div>
          <h1>Terry's Vinyl</h1>
          <p class="tagline">A personal record collection</p>
        </div>
      </div>
      <button id="add-btn" class="btn-primary">+ Add Record</button>
    </div>
  </header>

  <main>
    <section class="controls">
      <input type="text" id="search" placeholder="Search artist or album…" aria-label="Search records" />
      <select id="filter-genre" aria-label="Filter by genre">
        <option value="">All Genres</option>
      </select>
      <span id="record-count" class="record-count"></span>
    </section>

    <section id="collection" class="collection-grid" aria-label="Vinyl collection"></section>

    <p id="empty-msg" class="empty-msg hidden">No records found. Add one to get started!</p>

    <section id="recommend-section" class="recommend-section hidden">
      <h2>Recommend an album</h2>
      <p>Heard something Terry needs in his collection? Send him a recommendation.</p>
      <form id="recommend-form" novalidate>
        <div class="recommend-fields">
          <label>
            Your name <span class="required">*</span>
            <input type="text" id="r-name" required placeholder="e.g. Alex" />
          </label>
          <label>
            Artist <span class="required">*</span>
            <input type="text" id="r-artist" required placeholder="e.g. Radiohead" />
          </label>
          <label>
            Album <span class="required">*</span>
            <input type="text" id="r-album" required placeholder="e.g. OK Computer" />
          </label>
        </div>
        <button type="submit" class="btn-primary">Send Recommendation →</button>
      </form>
    </section>
  </main>

  <!-- Add / Edit Modal -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">
      <h2 id="modal-title">Add Record</h2>
      <form id="record-form" novalidate>
        <label>
          Artist <span class="required">*</span>
          <input type="text" id="f-artist" required placeholder="e.g. Fleetwood Mac" />
        </label>
        <label>
          Album <span class="required">*</span>
          <input type="text" id="f-album" required placeholder="e.g. Rumours" />
        </label>
        <label>
          Year
          <input type="number" id="f-year" min="1900" max="2099" placeholder="e.g. 1977" />
        </label>
        <label>
          Genre
          <input type="text" id="f-genre" placeholder="e.g. Rock" />
        </label>
        <label>
          Notes
          <textarea id="f-notes" rows="3" placeholder="Condition, pressing info, personal notes…"></textarea>
        </label>
        <div class="modal-actions">
          <button type="button" id="cancel-btn" class="btn-secondary">Cancel</button>
          <button type="submit" class="btn-primary" id="save-btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div id="confirm-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card modal-card--sm">
      <h2>Remove Record?</h2>
      <p id="confirm-msg"></p>
      <div class="modal-actions">
        <button id="confirm-cancel" class="btn-secondary">Cancel</button>
        <button id="confirm-delete" class="btn-danger">Remove</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
