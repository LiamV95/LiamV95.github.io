<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golf Booking Reminders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>⛳ Golf Booking Reminders</h1>
      <nav>
        <button id="btn-dashboard" class="nav-btn active">Dashboard</button>
        <button id="btn-manage" class="nav-btn">Manage Courses</button>
      </nav>
    </div>
  </header>

  <main id="main"></main>

  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <h2 id="modal-title">Add Course</h2>
      <form id="course-form" novalidate>
        <label>
          Course name
          <input id="f-name" type="text" required placeholder="e.g. Langara Golf Course">
        </label>
        <label>
          Booking lead time (days)
          <input id="f-lead" type="number" min="1" max="365" required placeholder="e.g. 3">
        </label>
        <label>
          Booking window opens at
          <input id="f-time" type="time" value="06:00" required>
        </label>
        <label>
          Booking URL <span class="optional">(optional)</span>
          <input id="f-url" type="url" placeholder="https://...">
        </label>
        <label>
          Notes <span class="optional">(optional)</span>
          <textarea id="f-notes" rows="2" placeholder="Any extra info..."></textarea>
        </label>
        <p id="form-error" class="form-error hidden"></p>
        <div class="modal-actions">
          <button type="button" id="btn-cancel">Cancel</button>
          <button type="submit" class="btn-primary" id="btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
